name: Scrape MSHSAA District Spring Softball Brackets
 
# Manual dispatch only -- this is a one-time historical backfill, not a
# recurring job. Re-run it any time to resume/refresh (the scraper skips
# class/district/year combinations already present in the output file).
on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "First season to scrape (e.g. 2012 for the 2012-2013 season)"
        required: false
        default: "2012"
      end_year:
        description: "Last season to scrape (e.g. 2025 for the 2025-2026 season)"
        required: false
        default: "2025"
      delay:
        description: "Seconds to sleep between requests (politeness delay)"
        required: false
        default: "1.5"
 
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~1,344 combos * ~1.5-2.5s/request can run long; adjust if needed
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
 
      - name: Ensure output directory exists
        run: mkdir -p data
 
      - name: Run scraper
        run: |
          python Scrape_district_spring_softball_brackets.py \
            --start-year ${{ github.event.inputs.start_year }} \
            --end-year ${{ github.event.inputs.end_year }} \
            --classes 1 2 3 4 5 6 \
            --districts 1-16 \
            --sport spring_softball \
            --output data/spring_softball_district_brackets_2012-2026.json \
            --delay ${{ github.event.inputs.delay }} \
            --checkpoint-every 25
 
      - name: Flatten to CSV
        run: |
          python Flatten_brackets_to_csv.py \
            --input data/spring_softball_district_brackets_2012-2026.json \
            --output data/spring_softball_district_games_2012-2026.csv
 
      - name: Upload artifacts (backup, in case commit step is skipped)
        uses: actions/upload-artifact@v4
        with:
          name: spring-softball-district-brackets
          path: |
            data/spring_softball_district_brackets_2012-2026.json
            data/spring_softball_district_games_2012-2026.csv
          retention-days: 30
 
      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/spring_softball_district_brackets_2012-2026.json data/spring_softball_district_games_2012-2026.csv
          git diff --staged --quiet || git commit -m "Update spring softball district bracket data"
          git push
