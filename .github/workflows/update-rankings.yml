name: Update Rankings
 
on:
  # Runs every night at midnight Central time (6am UTC)
  schedule:
    - cron: '0 6 * * *'
 
  # Lets you trigger it manually from the Actions tab anytime
  workflow_dispatch:
 
  # Triggers automatically when any JSON file or the scraper
  # script is updated and pushed to the repository.
  # Note: the nightly automated commit will NOT re-trigger this
  # because GitHub's GITHUB_TOKEN commits are exempt from
  # workflow triggers — no infinite loop risk.
  push:
    paths:
      - '**.json'
      - 'update_rankings.py'
 
jobs:
  update:
    runs-on: ubuntu-latest
 
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests beautifulsoup4
 
      - name: Run rankings updater
        run: python update_rankings.py
 
      - name: Commit and push if rankings changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add rankings.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Update rankings $(date -u '+%Y-%m-%d')"
            git push
          )
