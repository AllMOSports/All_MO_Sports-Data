name: Update Rankings
 
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    paths:
      - '**.json'
      - 'update_rankings.py'
 
jobs:
  update:
    runs-on: ubuntu-latest
 
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run rankings updater
        run: python update_rankings.py
 
      - name: Commit and push if rankings changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add rankings.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Update rankings $(date -u '+%Y-%m-%d')"
            git push
          )
