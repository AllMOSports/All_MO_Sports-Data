name: Build schools.json

# Runs the schools.json aggregation -- merges each sport's MSHSAA season
# records (output/mshsaa_records/<sport>.json) with that sport's
# separate ratings repo (OVR/OFF/DEF, fetched live over the network) into
# one school-keyed file used by the team profile pages.
#
# IMPORTANT ORDERING: this must run AFTER the MSHSAA scraper has
# produced fresh output/mshsaa_records/ files, since this script reads
# those files from the repo checkout rather than scraping anything
# itself. Since both workflows are now manual-only, make sure to run
# the MSHSAA scraper first and let it finish before running this one.
#
# See build_schools_json.py's FIRST RUN CHECKLIST before fully trusting
# this -- run it once via workflow_dispatch and verify output/schools.json
# looks right first.

on:
  workflow_dispatch: {}
    # Manual trigger -- use this to run the aggregation on demand.
    # Run AFTER the "Scrape MSHSAA Season Records" workflow has
    # completed successfully.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Verify MSHSAA records exist before aggregating
        run: |
          if [ ! -d "output/mshsaa_records" ] || [ -z "$(ls -A output/mshsaa_records 2>/dev/null)" ]; then
            echo "::error::output/mshsaa_records/ is missing or empty -- the MSHSAA scraper may not have run yet, or committed to a different path. Aborting rather than building schools.json from nothing."
            exit 1
          fi
          echo "Found $(ls output/mshsaa_records | wc -l) file(s) in output/mshsaa_records/"

      - name: Run schools.json aggregation
        run: python3 Build_Schools_json.py

      - name: Commit updated schools.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/schools.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update schools.json [automated]"
            git push
          fi
